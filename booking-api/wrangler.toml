name            = "dpv-booking"
main            = "src/index.js"
compatibility_date = "2024-09-23"

[vars]
PRICE_PER_PERSON = "90"
MAX_GUESTS       = "8"
DEPOSIT_PCT      = "0.5"
SITE_URL         = "http://localhost:8080"  # update to production URL on deploy

[[d1_databases]]
binding       = "DB"
database_name = "dpv-booking"
database_id   = "local"               # replaced by real ID after: wrangler d1 create dpv-booking

# Secrets — set with: wrangler secret put SECRET_NAME
# STRIPE_SECRET_KEY
# STRIPE_PUBLISHABLE_KEY
# STRIPE_WEBHOOK_SECRET
# WEBCAL_SECRET          (protects the team feed URL)
