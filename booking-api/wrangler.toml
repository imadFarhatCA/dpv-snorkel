name            = "dpv-booking"
main            = "src/index.js"
compatibility_date = "2024-09-23"

[vars]
PRICE_PER_PERSON = "90"
MAX_GUESTS       = "8"
DEPOSIT_PCT      = "0.5"
SITE_URL         = "https://base1dpv-book.pages.dev"

[[d1_databases]]
binding       = "DB"
database_name = "dpv-booking"
database_id   = "7913a431-fe46-4c9e-b9ae-6ff70df7a3fe"

# Secrets — set with: wrangler secret put SECRET_NAME
