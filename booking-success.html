<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Confirmed — DPV Snorkel · Base One</title>
  <meta name="description" content="Your DPV Snorkel Experience booking is confirmed. Add it to your calendar and prepare for the day." />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="lib/config.js"></script>
  <script src="lib/nav.js" defer></script>
  <style>
    .success-hero {
      background: var(--color-dark-alt);
      padding: calc(var(--nav-h) + 56px) 24px 56px;
      text-align: center;
      color: #fff;
    }
    .check-circle {
      width: 72px; height: 72px;
      background: rgba(34,197,94,.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .success-hero h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 700; margin-bottom: 10px; }
    .success-hero p  { color: rgba(255,255,255,.65); }

    .success-container {
      max-width: 640px; margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .booking-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .booking-card-header {
      background: var(--color-ocean);
      color: #fff;
      padding: 16px 22px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .booking-card-body { padding: 22px; }

    .detail-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 9px 0;
      border-bottom: 1px solid var(--color-border);
      font-size: .93rem;
    }
    .detail-row:last-child { border: none; }
    .detail-label { color: var(--color-muted); }
    .detail-val   { font-weight: 600; color: var(--color-charcoal); }
    .detail-val.green { color: var(--color-success, #16a34a); }
    .detail-val.blue  { color: var(--color-ocean); }

    /* Calendar add buttons */
    .cal-section {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 22px;
      margin-bottom: 20px;
    }
    .cal-title {
      font-size: .75rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--color-muted); margin-bottom: 16px;
    }
    .cal-buttons {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .cal-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: #fff; color: var(--color-charcoal);
      font-family: var(--font); font-size: .88rem; font-weight: 600;
      text-decoration: none; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .cal-btn:hover { border-color: var(--color-ocean); background: rgba(6,147,227,.05); }
    .cal-btn.primary {
      background: var(--color-ocean); color: #fff;
      border-color: transparent;
    }
    .cal-btn.primary:hover { background: var(--color-ocean-dk); }

    .note-box {
      background: #fff7ed; border: 1px solid #fed7aa;
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: .86rem; color: #92400e;
      margin-bottom: 20px;
    }

    .loading-state {
      text-align: center; padding: 60px 24px;
      color: var(--color-muted); font-size: .95rem;
    }
    .spinner-dark {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid rgba(0,0,0,.15);
      border-top-color: var(--color-ocean);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-right: 10px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- NAV -->
  <div data-nav-mount data-back-url="index.html" data-back-label="← Back to Experience"></div>

  <!-- HERO -->
  <div class="success-hero">
    <div class="check-circle">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1 id="hero-title">Booking Confirmed!</h1>
    <p id="hero-sub">Your deposit has been received. See you on the water!</p>
  </div>

  <div class="success-container">
    <div id="main-content">
      <div class="loading-state">
        <span class="spinner-dark"></span>Loading your booking…
      </div>
    </div>
  </div>

  <script>
    const API = window.DPV_CONFIG.API;

    const sessionId = new URLSearchParams(location.search).get('session_id');

    async function loadBooking() {
      if (!sessionId) { showError(); return; }

      try {
        const res  = await fetch(`${API}/api/confirm?session_id=${sessionId}`);
        const data = await res.json();
        if (!res.ok || !data.booking) { showError(); return; }
        renderBooking(data.booking);
      } catch {
        showError();
      }
    }

    function renderBooking(b) {
      const balance = (b.total_amount - b.deposit_amount).toFixed(2);
      const icsUrl  = `${API}/calendar/${b.ical_token}.ics`;
      const cfg     = window.DPV_CONFIG;
      const gcUrl   = `https://calendar.google.com/calendar/render?action=TEMPLATE`
        + `&text=${encodeURIComponent('DPV Snorkel Experience — Base One')}`
        + `&dates=${b.date.replace(/-/g,'')}/${nextDay(b.date)}`
        + `&details=${encodeURIComponent(`Guests: ${b.guests}\nDeposit paid: €${b.deposit_amount}\nBalance due: €${balance}\n\nMeeting point: ${cfg.MEETING_POINT}`)}`
        + `&location=${encodeURIComponent(cfg.MEETING_POINT_LONG)}`;

      document.getElementById('main-content').innerHTML = `

        <!-- Booking details -->
        <div class="booking-card">
          <div class="booking-card-header">Booking Confirmation</div>
          <div class="booking-card-body">
            <div class="detail-row">
              <span class="detail-label">Name</span>
              <span class="detail-val">${esc(b.name)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Date</span>
              <span class="detail-val blue">${b.date}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Guests</span>
              <span class="detail-val">${b.guests}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Meeting point</span>
              <span class="detail-val">${cfg.MEETING_POINT} · Arrive by ${cfg.ARRIVAL_TIME}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Total price</span>
              <span class="detail-val">€${b.total_amount.toFixed(2)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Deposit paid today ✓</span>
              <span class="detail-val green">€${b.deposit_amount.toFixed(2)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Balance due on the day</span>
              <span class="detail-val">€${balance}</span>
            </div>
          </div>
        </div>

        <!-- Balance reminder -->
        <div class="note-box">
          💳 Please bring <strong>€${balance}</strong> cash or card on the day.
          The balance is due before boarding.
        </div>

        <!-- Add to calendar -->
        <div class="cal-section">
          <p class="cal-title">Add to Your Calendar</p>
          <div class="cal-buttons">
            <a href="${icsUrl}" download="dpv-trip-${b.date}.ics" class="cal-btn primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Add to iPhone / iCal
            </a>
            <a href="${gcUrl}" target="_blank" rel="noopener" class="cal-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Add to Google Calendar
            </a>
            <a href="${icsUrl}" download class="cal-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download .ics
            </a>
          </div>
          <p style="font-size:.78rem;color:var(--color-muted);margin-top:12px">
            Tap "Add to iPhone / iCal" to add directly to your iPhone Calendar or Mac Calendar.
          </p>
        </div>

        <!-- Actions -->
        <div style="text-align:center;margin-top:32px">
          <a href="index.html" class="btn btn-primary" style="margin-right:12px">← Back to DPV</a>
          <a href="${cfg.WHATSAPP_URL}" target="_blank" class="btn btn-ghost">Questions? WhatsApp us</a>
        </div>
      `;
    }

    function showError() {
      document.getElementById('hero-title').textContent = 'Something went wrong';
      document.getElementById('hero-sub').textContent   = 'Your payment may have been processed — please contact us.';
      document.getElementById('main-content').innerHTML = `
        <div style="text-align:center;padding:40px 0">
          <p style="color:var(--color-muted);margin-bottom:24px">
            If your payment was charged, your booking is confirmed — we'll be in touch shortly.
          </p>
          <a href="${cfg.WHATSAPP_URL}" target="_blank" class="btn btn-primary">Contact Base One</a>
        </div>
      `;
    }

    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    function nextDay(dateStr) {
      const d = new Date(dateStr + 'T12:00:00Z');
      d.setUTCDate(d.getUTCDate() + 1);
      return d.toISOString().slice(0, 10).replace(/-/g, '');
    }

    loadBooking();
  </script>

</body>
</html>
